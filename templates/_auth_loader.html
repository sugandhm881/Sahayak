<!-- Sahayak loading overlay for auth/pre-login pages -->
<!-- app.css (loaded via _shell_head.html) already provides all .sDialog-* styles -->
<div id="sDialog-backdrop">
  <div id="sDialog-box">
    <div class="sDialog-body">
      <div id="sDialog-icon" class="sDialog-icon loading" style="position:relative;width:96px;height:96px;border-radius:50%;background:#f5f3ff;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 20px;">
        <div class="sd-ring"></div>
        <div style="width:56px;height:56px;min-width:56px;min-height:56px;background:url('/static/sayahak_logo_2.5.png') center/contain no-repeat;position:relative;z-index:1;flex-shrink:0;"></div>
      </div>
      <div id="sDialog-title" class="sDialog-title">Please wait…</div>
      <div id="sDialog-msg"   class="sDialog-msg"></div>
      <div id="sDialog-step"  class="sDialog-step"></div>
    </div>
    <div id="sDialog-footer" class="sDialog-footer"></div>
  </div>
</div>
<script>
(function() {
  function showAuthLoader(title) {
    document.getElementById('sDialog-title').textContent = title || 'Please wait…';
    document.getElementById('sDialog-backdrop').classList.add('active');
  }
  /* Auto-wire every .auth-form: read data-loading-title from submit button, show loader on submit */
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('form.auth-form').forEach(function(form) {
      form.addEventListener('submit', function() {
        var btn = form.querySelector('button[type="submit"]');
        var title = (btn && btn.getAttribute('data-loading-title')) || 'Please wait…';
        showAuthLoader(title);
      });
    });
  });
})();
</script>
